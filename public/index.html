<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Groove Candy Slide Maker</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍬</text></svg>">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0a0a0a; color: #fff;
        min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      }
      .container { max-width: 640px; width: 100%; padding: 40px 20px; }
      h1 {
        text-align: center; font-size: 28px; margin-bottom: 8px;
        background: linear-gradient(135deg, #f5a623, #e74c8b);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      }
      .subtitle { text-align: center; color: #888; font-size: 14px; margin-bottom: 40px; }
      .form-group { margin-bottom: 20px; }
      label {
        display: block; font-size: 13px; color: #aaa; margin-bottom: 6px;
        text-transform: uppercase; letter-spacing: 1px;
      }
      input[type="text"], input[type="number"] {
        width: 100%; padding: 14px 16px; background: #1a1a1a;
        border: 1px solid #333; border-radius: 10px; color: #fff;
        font-size: 16px; outline: none; transition: border-color 0.2s;
      }
      input:focus { border-color: #f5a623; }
      .row { display: flex; gap: 12px; }
      .row .form-group { flex: 1; }
      .btn {
        width: 100%; padding: 16px;
        background: linear-gradient(135deg, #f5a623, #e74c8b);
        border: none; border-radius: 10px; color: #fff;
        font-size: 18px; font-weight: 600; cursor: pointer;
        margin-top: 10px; transition: opacity 0.2s;
      }
      .btn:hover { opacity: 0.9; }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .btn-green { background: linear-gradient(135deg, #4caf50, #2e7d32); }
      .btn-back { margin-top: 10px; background: #333; font-size: 14px; }
      #status { margin-top: 30px; text-align: center; }
      .spinner {
        display: inline-block; width: 24px; height: 24px;
        border: 3px solid #333; border-top-color: #f5a623;
        border-radius: 50%; animation: spin 0.8s linear infinite;
        margin-right: 10px; vertical-align: middle;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .status-text { color: #aaa; font-size: 15px; vertical-align: middle; }
      .error { color: #ff4444; }
      .section-title {
        font-size: 13px; color: #888; text-transform: uppercase;
        letter-spacing: 1px; margin-bottom: 12px; margin-top: 28px;
      }
      .img-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
      .img-card {
        position: relative; cursor: pointer; border-radius: 10px; overflow: hidden;
        border: 3px solid transparent; transition: border-color 0.2s, transform 0.15s;
        aspect-ratio: 1;
      }
      .img-card:hover { transform: scale(1.03); }
      .img-card.selected { border-color: #f5a623; }
      .img-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .img-badge {
        position: absolute; top: 6px; right: 6px;
        background: rgba(0,0,0,0.75); color: #f5a623;
        font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600;
      }
      .img-label {
        position: absolute; bottom: 0; left: 0; right: 0;
        background: rgba(0,0,0,0.7); color: #ccc; font-size: 10px;
        padding: 4px 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .img-check {
        position: absolute; top: 6px; left: 6px; width: 22px; height: 22px;
        border-radius: 50%; background: #f5a623; display: none;
        align-items: center; justify-content: center;
        font-size: 14px; color: #000; font-weight: bold;
      }
      .img-card.selected .img-check { display: flex; }
      .meta-info {
        background: #1a1a1a; border-radius: 12px; padding: 16px;
        margin-bottom: 8px; text-align: center;
      }
      .meta-artist { font-size: 20px; font-weight: 700; }
      .meta-track { color: #aaa; font-size: 15px; margin-top: 4px; }
      .caption-box {
        background: #1a1a1a; border: 1px solid #333; border-radius: 12px;
        padding: 20px 16px 16px; white-space: pre-wrap;
        font-size: 14px; line-height: 1.6; color: #ddd; position: relative;
      }
      .caption-box .ht { color: #6b8afd; }
      .copy-btn {
        position: absolute; top: 10px; right: 10px; padding: 6px 14px;
        background: #333; border: 1px solid #555; border-radius: 6px;
        color: #f5a623; font-size: 12px; cursor: pointer; transition: background 0.2s;
      }
      .copy-btn:hover { background: #444; }
      .copy-btn.ok { color: #4caf50; border-color: #4caf50; }
      .progress-wrap {
        background: #1a1a1a; border-radius: 12px; padding: 30px 20px;
        text-align: center; margin-top: 20px;
      }
      .progress-bar {
        width: 100%; height: 6px; background: #333;
        border-radius: 3px; margin: 16px 0 12px; overflow: hidden;
      }
      .progress-fill {
        height: 100%; background: linear-gradient(90deg, #f5a623, #e74c8b);
        border-radius: 3px; transition: width 0.4s ease;
      }
      .progress-label { color: #aaa; font-size: 14px; }
      .dropzone {
        border: 2px dashed #444; border-radius: 16px; padding: 40px 20px;
        text-align: center; cursor: pointer; transition: all 0.25s;
        margin-top: 20px; background: #111;
      }
      .dropzone:hover, .dropzone.dragover { border-color: #f5a623; background: #1a1a0a; }
      .dropzone-icon { font-size: 36px; margin-bottom: 12px; }
      .dropzone-text { color: #aaa; font-size: 15px; line-height: 1.6; }
      .dropzone-text strong { color: #f5a623; }
      .dropzone-file { color: #4caf50; font-size: 14px; margin-top: 8px; font-weight: 600; }
      .dropzone input[type="file"] { display: none; }
      .slide-card {
        background: #1a1a1a; border-radius: 12px; padding: 16px;
        margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between;
      }
      .slide-info { display: flex; align-items: center; gap: 12px; }
      .slide-icon {
        width: 44px; height: 44px; background: #222; border-radius: 8px;
        display: flex; align-items: center; justify-content: center; font-size: 20px;
      }
      .slide-name { font-weight: 600; }
      .slide-detail { color: #888; font-size: 13px; margin-top: 2px; }
      .dl-btn {
        padding: 8px 18px; background: #222; border: 1px solid #444;
        border-radius: 8px; color: #f5a623; text-decoration: none;
        font-size: 14px; font-weight: 500; transition: background 0.2s; cursor: pointer;
      }
      .dl-btn:hover { background: #333; }
      .video-preview {
        width: 100%; max-width: 320px; margin: 16px auto;
        display: block; border-radius: 12px; background: #111;
      }
      .btn-bulk {
        background: linear-gradient(135deg, #6b8afd, #4c5fd7);
        display: flex; align-items: center; justify-content: center; gap: 10px;
      }
      .slides-list { margin-top: 16px; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Groove Candy</h1>
      <p class="subtitle">1 lien YouTube &#8594; 3 slides vid&eacute;o Instagram</p>

      <!-- STEP 1: Search -->
      <div id="step1">
        <div class="form-group">
          <label>Lien YouTube</label>
          <input type="text" id="url" placeholder="https://youtube.com/watch?v=..." />
        </div>
        <div class="row">
          <div class="form-group">
            <label>Dur&eacute;e / slide (s)</label>
            <input type="number" id="duration" value="50" min="5" max="120" />
          </div>
          <div class="form-group">
            <label>D&eacute;part (s)</label>
            <input type="number" id="start" value="0" min="0" />
          </div>
        </div>
        <button class="btn" id="searchBtn" onclick="doSearch()">Rechercher</button>
      </div>

      <div id="status"></div>

      <!-- STEP 2: Select image + audio -->
      <div id="step2" class="hidden">
        <div id="metaBox"></div>
        <div class="section-title">Choisis l'image du macaron</div>
        <div class="img-grid" id="imgGrid"></div>
        <div class="section-title">Caption Instagram</div>
        <div class="caption-box" id="captionBox"></div>
        <div id="audioSection"></div>
        <button class="btn btn-green" id="genBtn" onclick="doGenerate()" style="margin-top:20px" disabled>
          S&eacute;lectionne une image pour continuer
        </button>
        <button class="btn btn-back" onclick="backToSearch()">&#8592; Nouvelle recherche</button>
      </div>

      <!-- STEP 3: Progress + Results -->
      <div id="step3" class="hidden"></div>
    </div>

    <script>
      var state = {};
      var ffmpegInstance = null;
      var ffmpegReady = false;
      var audioData = null;

      function esc(s) {
        if (!s) return "";
        var d = document.createElement("div");
        d.textContent = String(s);
        return d.innerHTML;
      }

      function showStatus(msg) {
        document.getElementById("status").innerHTML =
          '<span class="spinner"></span><span class="status-text">' + esc(msg) + "</span>";
      }
      function hideStatus() { document.getElementById("status").innerHTML = ""; }
      function showError(msg) {
        document.getElementById("status").innerHTML =
          '<span class="status-text error">' + esc(msg) + "</span>";
        var sb = document.getElementById("searchBtn");
        if (sb) sb.disabled = false;
      }

      function showStep(id) {
        ["step1","step2","step3"].forEach(function(s) {
          document.getElementById(s).classList.add("hidden");
        });
        document.getElementById(id).classList.remove("hidden");
      }

      /* ── Step 1: Search ── */

      function doSearch() {
        var url = document.getElementById("url").value.trim();
        if (!url) return;
        document.getElementById("searchBtn").disabled = true;
        audioData = null;
        showStatus("Recherche YouTube + Discogs...");

        fetch("/api/search", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url: url }),
        })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            document.getElementById("searchBtn").disabled = false;
            hideStatus();
            if (data.error) { showError(data.error); return; }
            state = data;
            state.selectedIdx = null;
            showStep2(data);
            tryAutoAudio();
          })
          .catch(function(e) {
            document.getElementById("searchBtn").disabled = false;
            showError(e.message);
          });
      }

      /* ── Auto-download audio (try server, fallback to upload) ── */

      function tryAutoAudio() {
        var sec = document.getElementById("audioSection");
        sec.innerHTML =
          '<div class="section-title" style="margin-top:24px">Audio</div>' +
          '<div class="progress-wrap" id="audioProgress">' +
            '<span class="spinner"></span>' +
            '<span class="status-text">T\u00e9l\u00e9chargement automatique de l\'audio...</span>' +
          '</div>';

        fetch("/api/audio", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url: document.getElementById("url").value.trim() }),
        })
          .then(function(r) {
            if (!r.ok) throw new Error("server");
            return r.arrayBuffer();
          })
          .then(function(buf) {
            audioData = new Uint8Array(buf);
            sec.innerHTML =
              '<div class="section-title" style="margin-top:24px">Audio</div>' +
              '<div style="background:#1a2a1a;border:1px solid #2e7d32;border-radius:12px;padding:16px;text-align:center;color:#4caf50;font-size:14px">' +
                'Audio t\u00e9l\u00e9charg\u00e9 automatiquement (' + (audioData.length / 1048576).toFixed(1) + ' MB)' +
              '</div>';
            checkReady();
          })
          .catch(function() {
            showUploadZone();
          });
      }

      function showUploadZone() {
        var sec = document.getElementById("audioSection");
        sec.innerHTML =
          '<div class="section-title" style="margin-top:24px">Audio du morceau</div>' +
          '<div class="dropzone" id="dropzone" onclick="document.getElementById(\'audioFile\').click()">' +
            '<input type="file" id="audioFile" accept="audio/*,.mp3,.m4a,.wav,.ogg,.webm,.flac,.aac" />' +
            '<div class="dropzone-icon">&#127925;</div>' +
            '<div class="dropzone-text">' +
              '<strong>Glisse ton fichier audio ici</strong><br>' +
              'ou clique pour choisir (mp3, m4a, wav...)' +
            '</div>' +
            '<div class="dropzone-file" id="dropFileName"></div>' +
          '</div>';

        var dz = document.getElementById("dropzone");
        var fi = document.getElementById("audioFile");

        dz.addEventListener("dragover", function(e) { e.preventDefault(); dz.classList.add("dragover"); });
        dz.addEventListener("dragleave", function() { dz.classList.remove("dragover"); });
        dz.addEventListener("drop", function(e) {
          e.preventDefault(); dz.classList.remove("dragover");
          if (e.dataTransfer.files.length) handleAudioFile(e.dataTransfer.files[0]);
        });
        fi.addEventListener("change", function() {
          if (fi.files.length) handleAudioFile(fi.files[0]);
        });
      }

      function handleAudioFile(file) {
        var name = document.getElementById("dropFileName");
        name.textContent = file.name + " (" + (file.size / 1048576).toFixed(1) + " MB)";
        file.arrayBuffer().then(function(buf) {
          audioData = new Uint8Array(buf);
          checkReady();
        });
      }

      /* ── Step 2: Image selection ── */

      function showStep2(data) {
        showStep("step2");
        document.getElementById("metaBox").innerHTML =
          '<div class="meta-info"><div class="meta-artist">' + esc(data.artist) +
          '</div><div class="meta-track">' + esc(data.track) + "</div></div>";

        var grid = document.getElementById("imgGrid");
        grid.innerHTML = "";
        data.images.forEach(function(img, i) {
          var card = document.createElement("div");
          card.className = "img-card";
          card.setAttribute("data-idx", i);
          card.onclick = function() { selectImage(i); };
          card.innerHTML =
            '<img src="' + esc(img.thumb) + '" loading="lazy" />' +
            '<div class="img-check">&#10003;</div>' +
            '<div class="img-badge">' + img.score + '</div>' +
            '<div class="img-label">' + esc(img.label || img.type) + '</div>';
          grid.appendChild(card);
        });
        updateCaption(data, 0);
      }

      function selectImage(idx) {
        state.selectedIdx = idx;
        document.querySelectorAll(".img-card").forEach(function(c) { c.classList.remove("selected"); });
        document.querySelector('.img-card[data-idx="' + idx + '"]').classList.add("selected");
        updateCaption(state, idx);
        checkReady();
      }

      function checkReady() {
        var btn = document.getElementById("genBtn");
        if (state.selectedIdx !== null && audioData) {
          btn.disabled = false;
          btn.textContent = "G\u00e9n\u00e9rer les 3 slides";
        } else if (state.selectedIdx !== null) {
          btn.disabled = true;
          btn.textContent = "Audio requis pour g\u00e9n\u00e9rer";
        } else {
          btn.disabled = true;
          btn.textContent = "S\u00e9lectionne une image";
        }
      }

      function updateCaption(data, idx) {
        var img = idx !== null ? data.images[idx] : data.images[0] || {};
        var cap = "Artist: " + data.artist + "\n";
        cap += "Music: " + data.track + "\n";
        if (img.label) cap += "Label: " + img.label + "\n";
        if (img.year) cap += "Year: " + img.year + "\n";
        cap += "\n.\n.\n.\n\n";
        cap += "#deephouse #funkyhouse #chicagohouse #house #garagehouse";
        window._cap = cap;

        document.getElementById("captionBox").innerHTML =
          '<button class="copy-btn" onclick="copyC()">Copier</button>' +
          esc(cap).replace(/#(\w+)/g, '<span class="ht">#$1</span>');
      }

      function copyC() {
        navigator.clipboard.writeText(window._cap).then(function() {
          var b = document.querySelector(".copy-btn");
          b.textContent = "Copi\u00e9 !"; b.classList.add("ok");
          setTimeout(function() { b.textContent = "Copier"; b.classList.remove("ok"); }, 2000);
        });
      }

      function backToSearch() { showStep("step1"); hideStatus(); audioData = null; }

      /* ── ffmpeg.wasm ── */

      async function toBlobURL(url, mimeType) {
        var resp = await fetch(url);
        var buf = await resp.arrayBuffer();
        return URL.createObjectURL(new Blob([buf], { type: mimeType }));
      }

      async function loadFFmpeg() {
        if (ffmpegReady) return;
        var mod = await import("https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.15/dist/esm/index.js");
        ffmpegInstance = new mod.FFmpeg();

        var base = "https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.10/dist/umd";
        await ffmpegInstance.load({
          coreURL: await toBlobURL(base + "/ffmpeg-core.js", "text/javascript"),
          wasmURL: await toBlobURL(base + "/ffmpeg-core.wasm", "application/wasm"),
        });
        ffmpegReady = true;
      }

      function createVinylImage(imgUrl) {
        return new Promise(function(resolve, reject) {
          var img = new Image();
          img.crossOrigin = "anonymous";
          img.onload = function() {
            var canvas = document.createElement("canvas");
            canvas.width = 1080; canvas.height = 1080;
            var ctx = canvas.getContext("2d");
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, 1080, 1080);
            var size = 800, x = 140, y = 140;
            ctx.save();
            ctx.beginPath();
            ctx.arc(x + size / 2, y + size / 2, size / 2, 0, Math.PI * 2);
            ctx.clip();
            var side = Math.min(img.width, img.height);
            var sx = (img.width - side) / 2, sy = (img.height - side) / 2;
            ctx.drawImage(img, sx, sy, side, side, x, y, size, size);
            ctx.restore();
            canvas.toBlob(function(blob) {
              blob ? resolve(blob) : reject(new Error("Canvas export failed"));
            }, "image/png");
          };
          img.onerror = function() { reject(new Error("Image load failed")); };
          img.src = imgUrl;
        });
      }

      /* ── Step 3: Generate ── */

      async function doGenerate() {
        if (state.selectedIdx === null || !audioData) return;

        var duration = +(document.getElementById("duration").value) || 50;
        var startTime = +(document.getElementById("start").value) || 0;
        var selectedImg = state.images[state.selectedIdx];
        var slideCount = 3;

        document.getElementById("genBtn").disabled = true;
        showStep("step3");
        hideStatus();

        function setProgress(label, pct) {
          document.getElementById("step3").innerHTML =
            '<div class="progress-wrap">' +
              '<div class="spinner"></div>' +
              '<div class="progress-label" style="margin-top:12px">' + esc(label) + '</div>' +
              '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
            '</div>' +
            '<button class="btn btn-back" onclick="backToStep2()">&#8592; Annuler</button>';
        }

        try {
          setProgress("Cr\u00e9ation image vinyl...", 10);
          var vinylBlob;
          try {
            vinylBlob = await createVinylImage(selectedImg.url);
          } catch (e) {
            vinylBlob = await createVinylImage("/api/proxy?url=" + encodeURIComponent(selectedImg.url));
          }
          var vinylBytes = new Uint8Array(await vinylBlob.arrayBuffer());

          setProgress("Chargement moteur vid\u00e9o (31 MB, mis en cache)...", 20);
          await loadFFmpeg();

          await ffmpegInstance.writeFile("vinyl.png", vinylBytes);
          await ffmpegInstance.writeFile("audio.m4a", audioData);

          var slides = [];
          for (var i = 0; i < slideCount; i++) {
            var segStart = startTime + i * duration;
            var outName = "slide_" + (i + 1) + ".mp4";
            var pct = 30 + Math.round((i / slideCount) * 60);
            setProgress("Cr\u00e9ation slide " + (i + 1) + "/" + slideCount + "...", pct);

            await ffmpegInstance.exec([
              "-loop", "1", "-i", "vinyl.png",
              "-i", "audio.m4a",
              "-ss", String(segStart), "-t", String(duration),
              "-c:v", "libx264", "-tune", "stillimage",
              "-c:a", "aac", "-b:a", "256k",
              "-r", "30", "-pix_fmt", "yuv420p",
              "-shortest", "-movflags", "+faststart",
              outName,
            ]);

            var data = await ffmpegInstance.readFile(outName);
            slides.push({
              name: outName,
              url: URL.createObjectURL(new Blob([data.buffer], { type: "video/mp4" })),
            });
            await ffmpegInstance.deleteFile(outName);
          }

          await ffmpegInstance.deleteFile("vinyl.png");
          await ffmpegInstance.deleteFile("audio.m4a");

          showResults(slides);
        } catch (e) {
          document.getElementById("step3").innerHTML =
            '<div class="progress-wrap"><div class="status-text error">' + esc(e.message) + '</div></div>' +
            '<button class="btn btn-back" onclick="backToStep2()">&#8592; Retour</button>';
        }
      }

      function showResults(slides) {
        window._resultFiles = slides;
        var h = '<div class="section-title">Slides g\u00e9n\u00e9r\u00e9es</div>';
        h += '<div class="meta-info"><div class="meta-artist">' + esc(state.artist) +
             '</div><div class="meta-track">' + esc(state.track) + '</div></div>';

        h += '<video class="video-preview" controls autoplay muted playsinline src="' + slides[0].url + '"></video>';

        h += '<button class="btn btn-bulk" onclick="bulkDownload()" style="margin-top:16px">' +
             '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' +
             ' Tout t\u00e9l\u00e9charger (' + slides.length + ' slides)</button>';

        h += '<div class="slides-list">';
        slides.forEach(function(f, i) {
          h += '<div class="slide-card"><div class="slide-info">' +
               '<div class="slide-icon">&#9654;</div>' +
               '<div><div class="slide-name">Slide ' + (i + 1) + '</div>' +
               '<div class="slide-detail">' + f.name + '</div></div></div>' +
               '<a class="dl-btn" href="' + f.url + '" download="' + f.name + '">T\u00e9l\u00e9charger</a></div>';
        });
        h += '</div>';

        var img = state.images[state.selectedIdx] || {};
        var cap = "Artist: " + state.artist + "\nMusic: " + state.track + "\n";
        if (img.label) cap += "Label: " + img.label + "\n";
        if (img.year) cap += "Year: " + img.year + "\n";
        cap += "\n.\n.\n.\n\n#deephouse #funkyhouse #chicagohouse #house #garagehouse";
        window._cap = cap;
        h += '<div class="section-title" style="margin-top:24px">Caption Instagram</div>';
        h += '<div class="caption-box">' +
             '<button class="copy-btn" onclick="copyC()">Copier</button>' +
             esc(cap).replace(/#(\w+)/g, '<span class="ht">#$1</span>') + '</div>';

        h += '<button class="btn btn-back" style="margin-top:20px" onclick="backToSearch()">&#8592; Nouvelle recherche</button>';
        document.getElementById("step3").innerHTML = h;
      }

      function bulkDownload() {
        (window._resultFiles || []).forEach(function(f, i) {
          setTimeout(function() {
            var a = document.createElement("a"); a.href = f.url; a.download = f.name;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
          }, i * 300);
        });
      }

      function backToStep2() {
        showStep("step2");
        document.getElementById("genBtn").disabled = false;
        checkReady();
      }
    </script>
  </body>
</html>
