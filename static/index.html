<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Groove Candy Slide Maker</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0a0a0a;
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .container {
        max-width: 640px;
        width: 100%;
        padding: 40px 20px;
      }
      h1 {
        text-align: center;
        font-size: 28px;
        margin-bottom: 8px;
        background: linear-gradient(135deg, #f5a623, #e74c8b);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .subtitle {
        text-align: center;
        color: #888;
        font-size: 14px;
        margin-bottom: 40px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        font-size: 13px;
        color: #aaa;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      input[type="text"],
      input[type="number"] {
        width: 100%;
        padding: 14px 16px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 10px;
        color: #fff;
        font-size: 16px;
        outline: none;
        transition: border-color 0.2s;
      }
      input:focus {
        border-color: #f5a623;
      }
      .row {
        display: flex;
        gap: 12px;
      }
      .row .form-group {
        flex: 1;
      }
      .btn {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #f5a623, #e74c8b);
        border: none;
        border-radius: 10px;
        color: #fff;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 10px;
        transition: opacity 0.2s;
      }
      .btn:hover {
        opacity: 0.9;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn-green {
        background: linear-gradient(135deg, #4caf50, #2e7d32);
      }
      .btn-back {
        margin-top: 10px;
        background: #333;
        font-size: 14px;
      }
      #status {
        margin-top: 30px;
        text-align: center;
      }
      .spinner {
        display: inline-block;
        width: 24px;
        height: 24px;
        border: 3px solid #333;
        border-top-color: #f5a623;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-right: 10px;
        vertical-align: middle;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .status-text {
        color: #aaa;
        font-size: 15px;
        vertical-align: middle;
      }
      .error {
        color: #ff4444;
      }
      .section-title {
        font-size: 13px;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 12px;
        margin-top: 28px;
      }
      .img-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 20px;
      }
      .img-card {
        position: relative;
        cursor: pointer;
        border-radius: 10px;
        overflow: hidden;
        border: 3px solid transparent;
        transition:
          border-color 0.2s,
          transform 0.15s;
        aspect-ratio: 1;
      }
      .img-card:hover {
        transform: scale(1.03);
      }
      .img-card.selected {
        border-color: #f5a623;
      }
      .img-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .img-badge {
        position: absolute;
        top: 6px;
        right: 6px;
        background: rgba(0, 0, 0, 0.75);
        color: #f5a623;
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 4px;
        font-weight: 600;
      }
      .img-label {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(0, 0, 0, 0.7);
        color: #ccc;
        font-size: 10px;
        padding: 4px 6px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .img-check {
        position: absolute;
        top: 6px;
        left: 6px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: #f5a623;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        color: #000;
        font-weight: bold;
      }
      .img-card.selected .img-check {
        display: flex;
      }
      .meta-info {
        background: #1a1a1a;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 8px;
        text-align: center;
      }
      .meta-artist {
        font-size: 20px;
        font-weight: 700;
      }
      .meta-track {
        color: #aaa;
        font-size: 15px;
        margin-top: 4px;
      }
      .caption-box {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 12px;
        padding: 20px 16px 16px;
        white-space: pre-wrap;
        font-size: 14px;
        line-height: 1.6;
        color: #ddd;
        position: relative;
      }
      .caption-box .ht {
        color: #6b8afd;
      }
      .copy-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        padding: 6px 14px;
        background: #333;
        border: 1px solid #555;
        border-radius: 6px;
        color: #f5a623;
        font-size: 12px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .copy-btn:hover {
        background: #444;
      }
      .copy-btn.ok {
        color: #4caf50;
        border-color: #4caf50;
      }
      .slide-card {
        background: #1a1a1a;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .slide-info {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .slide-icon {
        width: 44px;
        height: 44px;
        background: #222;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }
      .slide-name {
        font-weight: 600;
      }
      .slide-detail {
        color: #888;
        font-size: 13px;
        margin-top: 2px;
      }
      .dl-btn {
        padding: 8px 18px;
        background: #222;
        border: 1px solid #444;
        border-radius: 8px;
        color: #f5a623;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: background 0.2s;
      }
      .dl-btn:hover {
        background: #333;
      }
      .video-preview {
        width: 100%;
        max-width: 320px;
        margin: 16px auto;
        display: block;
        border-radius: 12px;
        background: #111;
      }
      .btn-bulk {
        background: linear-gradient(135deg, #6b8afd, #4c5fd7);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }
      .btn-bulk svg {
        flex-shrink: 0;
      }
      .slides-list {
        margin-top: 16px;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Groove Candy</h1>
      <p class="subtitle">
        1 lien YouTube &#8594; 3 slides vid&eacute;o Instagram
      </p>

      <!-- STEP 1 -->
      <div id="step1">
        <div class="form-group">
          <label>Lien YouTube</label>
          <input
            type="text"
            id="url"
            placeholder="https://youtube.com/watch?v=..."
          />
        </div>
        <div class="row">
          <div class="form-group">
            <label>Dur&eacute;e / slide (s)</label>
            <input type="number" id="duration" value="50" min="5" max="120" />
          </div>
          <div class="form-group">
            <label>D&eacute;part (s)</label>
            <input type="number" id="start" value="0" min="0" />
          </div>
        </div>
        <button class="btn" id="searchBtn" onclick="doSearch()">
          Rechercher
        </button>
      </div>

      <div id="status"></div>

      <!-- STEP 2 -->
      <div id="step2" class="hidden">
        <div id="metaBox"></div>
        <div class="section-title">Choisis l'image du macaron</div>
        <div class="img-grid" id="imgGrid"></div>
        <div class="section-title">Caption Instagram</div>
        <div class="caption-box" id="captionBox"></div>
        <button
          class="btn btn-green"
          id="genBtn"
          onclick="doGenerate()"
          style="margin-top: 20px"
          disabled
        >
          S&eacute;lectionne une image pour continuer
        </button>
        <button class="btn btn-back" onclick="backToSearch()">
          &#8592; Nouvelle recherche
        </button>
      </div>

      <!-- STEP 3 -->
      <div id="step3" class="hidden"></div>
    </div>

    <script>
      var state = {};

      function doSearch() {
        var url = document.getElementById("url").value.trim();
        if (!url) return;
        document.getElementById("searchBtn").disabled = true;
        showStatus("Recherche YouTube + Discogs...");

        fetch("/search", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url: url }),
        })
          .then(function (r) {
            return r.json();
          })
          .then(function (data) {
            document.getElementById("searchBtn").disabled = false;
            hideStatus();
            if (data.error) {
              showError(data.error);
              return;
            }
            state = data;
            state.selectedIdx = null;
            showStep2(data);
          })
          .catch(function (e) {
            document.getElementById("searchBtn").disabled = false;
            showError(e.message);
          });
      }

      function showStep2(data) {
        document.getElementById("step1").classList.add("hidden");
        document.getElementById("step2").classList.remove("hidden");
        document.getElementById("step3").classList.add("hidden");

        document.getElementById("metaBox").innerHTML =
          '<div class="meta-info"><div class="meta-artist">' +
          esc(data.artist) +
          '</div><div class="meta-track">' +
          esc(data.track) +
          "</div></div>";

        var grid = document.getElementById("imgGrid");
        grid.innerHTML = "";
        data.images.forEach(function (img, i) {
          var card = document.createElement("div");
          card.className = "img-card";
          card.setAttribute("data-idx", i);
          card.onclick = function () {
            selectImage(i);
          };
          card.innerHTML =
            '<img src="/output/candidates/' +
            data.search_id +
            "/" +
            img.filename +
            '" />' +
            '<div class="img-check">&#10003;</div>' +
            '<div class="img-badge">' +
            img.score +
            "</div>" +
            '<div class="img-label">' +
            esc(img.label || img.type) +
            "</div>";
          grid.appendChild(card);
        });

        updateCaption(data, null);
      }

      function selectImage(idx) {
        state.selectedIdx = idx;
        document.querySelectorAll(".img-card").forEach(function (c) {
          c.classList.remove("selected");
        });
        document
          .querySelector('.img-card[data-idx="' + idx + '"]')
          .classList.add("selected");

        var btn = document.getElementById("genBtn");
        btn.disabled = false;
        btn.textContent = "G\u00e9n\u00e9rer les slides";

        updateCaption(state, idx);
      }

      function updateCaption(data, idx) {
        var img = idx !== null ? data.images[idx] : data.images[0] || {};
        var cap = "Artist: " + data.artist + "\n";
        cap += "Music: " + data.track + "\n";
        if (img.label) cap += "Label: " + img.label + "\n";
        if (img.year) cap += "Year: " + img.year + "\n";
        cap += "\n.\n.\n.\n\n";
        cap += "#deephouse #funkyhouse #chicagohouse #house #garagehouse";
        window._cap = cap;

        var box = document.getElementById("captionBox");
        box.innerHTML =
          '<button class="copy-btn" onclick="copyC()">Copier</button>' +
          esc(cap).replace(/#(\w+)/g, '<span class="ht">#$1</span>');
      }

      function doGenerate() {
        if (state.selectedIdx === null) return;
        var duration = document.getElementById("duration").value || 50;
        var start = document.getElementById("start").value || 0;

        document.getElementById("genBtn").disabled = true;
        showStatus("G\u00e9n\u00e9ration des slides...");

        fetch("/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            url: document.getElementById("url").value.trim(),
            search_id: state.search_id,
            image_filename: state.images[state.selectedIdx].filename,
            duration: +duration,
            start: +start,
          }),
        })
          .then(function (r) {
            return r.json();
          })
          .then(function (data) {
            if (data.error) {
              showError(data.error);
              return;
            }
            pollJob(data.job_id);
          })
          .catch(function (e) {
            showError(e.message);
          });
      }

      function pollJob(jobId) {
        var iv = setInterval(function () {
          fetch("/status/" + jobId)
            .then(function (r) {
              return r.json();
            })
            .then(function (data) {
              if (data.status === "running") {
                showStatus(data.step);
              } else if (data.status === "done") {
                clearInterval(iv);
                hideStatus();
                showStep3(data);
              } else if (data.status === "error") {
                clearInterval(iv);
                showError(data.error);
              }
            });
        }, 2000);
      }

      function showStep3(data) {
        document.getElementById("step2").classList.add("hidden");
        var el = document.getElementById("step3");
        el.classList.remove("hidden");
        window._resultFiles = data.files;

        var h =
          '<div class="section-title">Slides g\u00e9n\u00e9r\u00e9es</div>';
        h +=
          '<div class="meta-info"><div class="meta-artist">' +
          esc(data.artist) +
          '</div><div class="meta-track">' +
          esc(data.track) +
          "</div></div>";

        h +=
          '<video class="video-preview" controls autoplay muted playsinline src="/output/' +
          data.files[0].name +
          '"></video>';

        h +=
          '<button class="btn btn-bulk" onclick="bulkDownload()">' +
          '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">' +
          '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>' +
          '<polyline points="7 10 12 15 17 10"/>' +
          '<line x1="12" y1="15" x2="12" y2="3"/></svg>' +
          "Tout t\u00e9l\u00e9charger (" +
          data.files.length +
          " slides)</button>";

        h += '<div class="slides-list">';
        data.files.forEach(function (f, i) {
          h += '<div class="slide-card"><div class="slide-info">';
          h += '<div class="slide-icon">&#9654;</div>';
          h += '<div><div class="slide-name">Slide ' + (i + 1) + "</div>";
          h += '<div class="slide-detail">' + f.name + "</div></div></div>";
          h +=
            '<a class="dl-btn" href="/output/' +
            f.name +
            '" download>T\u00e9l\u00e9charger</a></div>';
        });
        h += "</div>";

        var img = state.selectedIdx !== null ? state.images[state.selectedIdx] : (state.images ? state.images[0] : {});
        var cap = "Artist: " + data.artist + "\n";
        cap += "Music: " + data.track + "\n";
        if (img && img.label) cap += "Label: " + img.label + "\n";
        if (img && img.year) cap += "Year: " + img.year + "\n";
        cap += "\n.\n.\n.\n\n";
        cap += "#deephouse #funkyhouse #chicagohouse #house #garagehouse";
        window._cap = cap;

        h += '<div class="section-title" style="margin-top:24px">Caption Instagram</div>';
        h +=
          '<div class="caption-box" id="captionBoxResult">' +
          '<button class="copy-btn" onclick="copyC()">Copier</button>' +
          esc(cap).replace(/#(\w+)/g, '<span class="ht">#$1</span>') +
          "</div>";

        h +=
          '<button class="btn btn-back" style="margin-top:20px" onclick="backToSearch()">' +
          "&#8592; Nouvelle recherche</button>";
        el.innerHTML = h;
      }

      function bulkDownload() {
        if (!window._resultFiles) return;
        window._resultFiles.forEach(function (f, i) {
          setTimeout(function () {
            var a = document.createElement("a");
            a.href = "/output/" + f.name;
            a.download = f.name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
          }, i * 300);
        });
      }

      function backToSearch() {
        document.getElementById("step1").classList.remove("hidden");
        document.getElementById("step2").classList.add("hidden");
        document.getElementById("step3").classList.add("hidden");
        hideStatus();
      }

      function copyC() {
        navigator.clipboard.writeText(window._cap).then(function () {
          var b = document.querySelector(".copy-btn");
          b.textContent = "Copi\u00e9 !";
          b.classList.add("ok");
          setTimeout(function () {
            b.textContent = "Copier";
            b.classList.remove("ok");
          }, 2000);
        });
      }

      function showStatus(msg) {
        document.getElementById("status").innerHTML =
          '<span class="spinner"></span><span class="status-text">' +
          esc(msg) +
          "</span>";
      }
      function hideStatus() {
        document.getElementById("status").innerHTML = "";
      }
      function showError(msg) {
        document.getElementById("status").innerHTML =
          '<span class="status-text error">' + esc(msg) + "</span>";
        document.getElementById("searchBtn").disabled = false;
        document.getElementById("genBtn").disabled = false;
      }

      function esc(s) {
        if (!s) return "";
        var d = document.createElement("div");
        d.textContent = String(s);
        return d.innerHTML;
      }
    </script>
  </body>
</html>
